<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Select Element</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="topbar">
        <header class="hero">
          <h1>Select Element</h1>
          <div id="statusBadge" class="status-badge">未开始选择</div>
        </header>

        <div class="primary-actions">
          <button id="startButton" class="button button--primary" type="button">
            开始选择
          </button>
          <button id="stopButton" class="button button--secondary" type="button">
            停止选择
          </button>
        </div>

        <div class="toolbar__search">
          <input
            id="searchInput"
            class="search-input"
            type="search"
            placeholder="搜索标签、文本、页面标题或备注"
          />
          <div id="recordCount" class="record-count">共 0 条记录</div>
        </div>

        <div class="secondary-actions">
          <button id="copyCurrentButton" class="button button--ghost" type="button">
            复制当前
          </button>
          <button id="exportButton" class="button button--ghost" type="button">
            导出 JSON
          </button>
          <button id="clearButton" class="button button--danger" type="button">
            清空记录
          </button>
        </div>

        <details class="settings-fold">
          <summary>快捷键与悬浮球设置</summary>
          <div class="settings-fold__body">
            <div class="shortcut-bar">
              <span class="shortcut-label">快捷键</span>
              <span class="shortcut-item"><kbd>Alt</kbd><kbd>Shift</kbd><kbd>S</kbd> 开始选择</span>
              <span class="shortcut-item"><kbd>Alt</kbd><kbd>Shift</kbd><kbd>X</kbd> 停止选择</span>
              <span class="shortcut-item"><kbd>Esc</kbd> 退出</span>
            </div>
            <div class="fab-mode-bar">
              <span class="fab-mode-label">悬浮球</span>
              <div class="seg-control" id="fabModeControl">
                <button class="seg-btn is-active" type="button" data-fab-mode="off">关闭</button>
                <button class="seg-btn" type="button" data-fab-mode="current-tab">仅当前页</button>
                <button class="seg-btn" type="button" data-fab-mode="all-tabs">所有网页</button>
              </div>
            </div>
          </div>
        </details>
      </div>

      <main class="layout">
        <section class="panel-card panel-section list-section">
          <div class="section-heading">
            <h2>记录列表</h2>
          </div>
          <div id="listContainer" class="record-list" aria-live="polite"></div>
        </section>

        <section class="panel-card panel-section detail-panel">
          <div class="section-heading">
            <h2>详细信息</h2>
          </div>

          <div id="detailEmpty" class="detail-empty">
            请选择一条记录查看详情
          </div>

          <div id="detailContent" class="detail-content" hidden>
            <div class="detail-summary">
              <div>
                <div id="detailTitle" class="detail-title">未选择记录</div>
                <div id="detailMeta" class="detail-meta"></div>
              </div>
              <div class="detail-actions">
                <button
                  id="copyLocatorButton"
                  class="button button--ghost"
                  type="button"
                >
                  复制提示文本
                </button>
                <button
                  id="copyAgentPromptButton"
                  class="button button--ghost"
                  type="button"
                >
                  复制预制提示词
                </button>
                <button
                  id="copyMarkdownButton"
                  class="button button--secondary"
                  type="button"
                >
                  复制 Markdown
                </button>
                <button
                  id="deleteCurrentButton"
                  class="button button--danger"
                  type="button"
                >
                  删除当前记录
                </button>
              </div>
            </div>

            <div class="preview-panel" id="previewPanel">
              <div class="preview-heading">尺寸预览</div>

              <div class="preview-inputs">
                <label class="preview-field">
                  <span>宽度</span>
                  <input id="previewWidth" type="text" placeholder="如 300 或 50%" />
                </label>
                <label class="preview-field">
                  <span>高度</span>
                  <input id="previewHeight" type="text" placeholder="如 200 或 auto" />
                </label>
              </div>
              <div class="preview-actions">
                <button id="previewButton" class="button button--primary" type="button">
                  预览
                </button>
                <button id="restoreButton" class="button button--secondary" type="button">
                  恢复
                </button>
              </div>
              <div class="style-prompt-bar">
                <span class="style-prompt-label">快速修改提示词</span>
                <div class="style-prompt-actions">
                  <select id="styleChangeSelect" class="style-select">
                    <option value="resize">改宽高</option>
                    <option value="spacing">改间距</option>
                    <option value="borderRadius">改圆角</option>
                    <option value="fontSize">改字号</option>
                    <option value="color">改颜色</option>
                    <option value="layout">改布局</option>
                  </select>
                  <button id="copyStylePromptButton" class="button button--ghost" type="button">
                    复制修改提示词
                  </button>
                </div>
              </div>
            </div>

            <label class="note-field" for="noteInput">
              <span>备注</span>
              <textarea
                id="noteInput"
                placeholder="可为当前记录补充备注，便于后续检索"
              ></textarea>
            </label>
            <div class="note-actions">
              <button id="saveNoteButton" class="button button--ghost" type="button">
                保存备注
              </button>
            </div>

            <pre id="jsonViewer" class="json-viewer"></pre>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="utils.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
